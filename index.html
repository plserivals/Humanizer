<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reword — AI Humanizer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0d0d0d;color:#e8e0d0;font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6}
nav{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid #2a2a2a;background:#111}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:#e8e0d0}
.logo em{color:#c9a84c;font-style:italic}
.nav-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#6b6459;border:1px solid #2a2a2a;padding:3px 10px;border-radius:3px;letter-spacing:.08em}
.hero{text-align:center;padding:48px 24px 28px}
.eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;color:#c9a84c;letter-spacing:.15em;margin-bottom:14px}
h1{font-family:'Playfair Display',serif;font-size:clamp(32px,5vw,54px);font-weight:700;line-height:1.1;margin-bottom:12px}
h1 em{color:#c9a84c;font-style:italic}
.subtitle{color:#6b6459;max-width:460px;margin:0 auto;font-weight:300}
.settings{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:12px 32px;background:#161616;border-bottom:1px solid #2a2a2a}
.slabel{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6b6459;text-transform:uppercase;letter-spacing:.1em;margin-right:2px}
.pill{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:5px 13px;border-radius:100px;border:1px solid #2a2a2a;background:transparent;color:#6b6459;cursor:pointer;transition:all .15s}
.pill:hover{border-color:#c9a84c;color:#c9a84c}
.pill.on{background:#3d2e0f;border-color:#c9a84c;color:#c9a84c}
.sep{width:1px;height:20px;background:#2a2a2a;margin:0 6px}
.panels{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid #2a2a2a}
.panel{display:flex;flex-direction:column;border-right:1px solid #2a2a2a}
.panel:last-child{border-right:none}
.phead{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;background:#161616;border-bottom:1px solid #2a2a2a}
.ptitle{font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6b6459;text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:#2a2a2a}
.dot.amber{background:#c9a84c}
.dot.green{background:#5cb87a}
.pbtns{display:flex;gap:6px}
.ibtn{background:transparent;border:1px solid #2a2a2a;color:#6b6459;width:28px;height:28px;border-radius:5px;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ibtn:hover{border-color:#e8e0d0;color:#e8e0d0}
textarea{flex:1;background:transparent;border:none;outline:none;color:#e8e0d0;font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.75;resize:none;padding:20px;min-height:260px;font-weight:300}
textarea::placeholder{color:#3a3a3a}
.out{flex:1;padding:20px;font-size:14px;line-height:1.75;font-weight:300;overflow-y:auto;min-height:260px;white-space:pre-wrap;word-break:break-word}
.out.idle{color:#3a3a3a;font-family:'IBM Plex Mono',monospace;font-size:12px;display:flex;align-items:center;justify-content:center}
.out.err{color:#e05252}
.pfoot{padding:7px 18px;background:#161616;border-top:1px solid #2a2a2a;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6b6459;text-transform:uppercase;letter-spacing:.06em}
.pfoot span{color:#e8e0d0}
.actions{display:flex;align-items:center;justify-content:center;gap:12px;padding:16px 32px;background:#161616;border-top:1px solid #2a2a2a}
.btn-clear{background:transparent;border:1px solid #2a2a2a;color:#6b6459;padding:11px 18px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;transition:all .15s}
.btn-clear:hover{border-color:#e05252;color:#e05252}
.btn-go{background:#c9a84c;color:#0d0d0d;border:none;padding:11px 32px;border-radius:6px;font-family:'DM Sans',sans-serif;font-weight:500;font-size:15px;cursor:pointer;transition:all .2s}
.btn-go:hover:not(:disabled){background:#dfc06e;transform:translateY(-1px);box-shadow:0 6px 24px rgba(201,168,76,.25)}
.btn-go:disabled{opacity:.5;cursor:not-allowed;transform:none}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;border:1px solid #2a2a2a;color:#e8e0d0;padding:8px 18px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;opacity:0;transition:all .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:640px){.panels{grid-template-columns:1fr;}.panel{border-right:none;border-bottom:1px solid #2a2a2a}.settings,.actions{padding:12px 16px}}
</style>
</head>
<body>

<nav>
  <div class="logo">Re<em>word</em></div>
  <div class="nav-tag">AI HUMANIZER V1.0</div>
</nav>

<div class="hero">
  <div class="eyebrow">── POWERED BY GEMINI ──</div>
  <h1>Make AI text sound <em>human.</em></h1>
  <p class="subtitle">Paste AI-generated content below and transform it into natural, authentic writing — in seconds.</p>
</div>

<div class="settings">
  <span class="slabel">Tone</span>
  <button class="pill on" data-group="tone" data-val="Natural">Natural</button>
  <button class="pill" data-group="tone" data-val="Casual">Casual</button>
  <button class="pill" data-group="tone" data-val="Professional">Professional</button>
  <button class="pill" data-group="tone" data-val="Academic">Academic</button>
  <div class="sep"></div>
  <span class="slabel">Intensity</span>
  <button class="pill" data-group="intensity" data-val="Light">Light</button>
  <button class="pill on" data-group="intensity" data-val="Moderate">Moderate</button>
  <button class="pill" data-group="intensity" data-val="Heavy">Heavy</button>
</div>

<div class="panels">
  <div class="panel">
    <div class="phead">
      <div class="ptitle"><div class="dot amber"></div>AI-Generated Text</div>
      <div class="pbtns">
        <button class="ibtn" id="pasteBtn" title="Paste">📋</button>
        <button class="ibtn" id="clearIn" title="Clear">✕</button>
      </div>
    </div>
    <textarea id="input" placeholder="Paste your AI-generated text here..."></textarea>
    <div class="pfoot">Words: <span id="wIn">0</span> &nbsp; Chars: <span id="cIn">0</span></div>
  </div>
  <div class="panel">
    <div class="phead">
      <div class="ptitle"><div class="dot" id="outDot"></div>Humanized Output</div>
      <div class="pbtns">
        <button class="ibtn" id="copyBtn" title="Copy">⎘</button>
      </div>
    </div>
    <div class="out idle" id="output">Output will appear here</div>
    <div class="pfoot" id="outFoot" style="visibility:hidden">Words: <span id="wOut">0</span></div>
  </div>
</div>

<div class="actions">
  <button class="btn-clear" id="clearAll">Clear All</button>
  <button class="btn-go" id="goBtn">✦ Humanize Text</button>
</div>

<div class="toast" id="toast"></div>

<script>
const API_KEY = 'AIzaSyB23zBVJW7wvlO7kk5QvePTZSoTbnk6nRg';
const inputEl = document.getElementById('input');
const outputEl = document.getElementById('output');
const goBtn = document.getElementById('goBtn');
const outDot = document.getElementById('outDot');
const outFoot = document.getElementById('outFoot');
let tone = 'Natural', intensity = 'Moderate', busy = false;

// Pills
document.querySelectorAll('.pill').forEach(p => {
  p.addEventListener('click', () => {
    document.querySelectorAll(`.pill[data-group="${p.dataset.group}"]`).forEach(x => x.classList.remove('on'));
    p.classList.add('on');
    if (p.dataset.group === 'tone') tone = p.dataset.val;
    else intensity = p.dataset.val;
  });
});

// Stats
inputEl.addEventListener('input', () => {
  const v = inputEl.value;
  document.getElementById('wIn').textContent = v.trim() ? v.trim().split(/\s+/).length : 0;
  document.getElementById('cIn').textContent = v.length;
});

// Paste
document.getElementById('pasteBtn').addEventListener('click', async () => {
  try { inputEl.value = await navigator.clipboard.readText(); inputEl.dispatchEvent(new Event('input')); toast('Pasted'); }
  catch { toast('Allow clipboard access'); }
});

document.getElementById('clearIn').addEventListener('click', () => { inputEl.value = ''; inputEl.dispatchEvent(new Event('input')); });
document.getElementById('clearAll').addEventListener('click', () => {
  inputEl.value = ''; inputEl.dispatchEvent(new Event('input'));
  outputEl.textContent = 'Output will appear here';
  outputEl.className = 'out idle';
  outDot.className = 'dot';
  outFoot.style.visibility = 'hidden';
});
document.getElementById('copyBtn').addEventListener('click', () => {
  if (!outputEl.textContent || outputEl.classList.contains('idle')) return toast('Nothing to copy');
  navigator.clipboard.writeText(outputEl.textContent).then(() => toast('Copied ✓'));
});

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function buildPrompt(text) {
  const toneMap = {Natural:'natural conversational',Casual:'casual everyday like texting a friend',Professional:'professional and polished',Academic:'academic but readable'};
  const intMap = {
    Light:'Make light changes: vary sentence length, soften formal phrases, keep most structure.',
    Moderate:"Rewrite substantially: vary rhythm, use natural transitions, remove AI clichés like 'In conclusion', 'Furthermore', 'It's important to note'.",
    Heavy:'Completely reimagine in a human voice. Restructure, inject personality, vary patterns. Same meaning, transformed writing.'
  };
  return `You are an expert editor transforming AI-generated text into authentic human writing.

Rewrite in a ${toneMap[tone]} voice.
${intMap[intensity]}

Rules:
- No "In conclusion", "Furthermore", "Moreover", "It's important to note", "Certainly!", "Absolutely!"
- Vary sentence lengths naturally
- Use contractions where they fit
- Output ONLY the rewritten text, nothing else

Text:
${text}`;
}

goBtn.addEventListener('click', async () => {
  const text = inputEl.value.trim();
  if (!text) return toast('Paste some text first');
  if (busy) return;
  busy = true;
  goBtn.disabled = true;
  goBtn.textContent = 'Humanizing...';
  outputEl.textContent = 'Working...';
  outputEl.className = 'out';
  outDot.className = 'dot amber';

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
      {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          contents: [{parts:[{text: buildPrompt(text)}]}],
          generationConfig: {maxOutputTokens:2000, temperature:0.9}
        })
      }
    );
    const data = await res.json();
    if (!res.ok) throw new Error(data?.error?.message || `HTTP ${res.status}`);
    const out = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    if (!out) throw new Error('Empty response');
    outputEl.textContent = out;
    outputEl.className = 'out';
    outDot.className = 'dot green';
    document.getElementById('wOut').textContent = out.trim().split(/\s+/).length;
    outFoot.style.visibility = 'visible';
    toast('Done ✓');
  } catch(e) {
    outputEl.textContent = '⚠ ' + e.message;
    outputEl.className = 'out err';
    outDot.className = 'dot';
    toast('Error: ' + e.message);
  } finally {
    busy = false;
    goBtn.disabled = false;
    goBtn.textContent = '✦ Humanize Text';
  }
});
</script>
</body>
</html>
